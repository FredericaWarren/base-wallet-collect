<!doctype html>
<html lang="zh-CN">
  <head>
    <!-- 基础编码 & 响应式 -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- 标题 & 描述（很关键，会影响展示） -->
    <title>Base Quest - 每日任务赚积分</title>
    <meta name="description" content="参与 Base 每日任务，签到、完成挑战、获得积分与奖励。" />
    <meta name="keywords" content="Base, Web3, 任务系统, 积分, 空投, Quest" />

    <!-- ⭐ Base 验证（必须） -->
    <meta
      name="base:app_id"
      content="69ba504a5b0dee671be77ead"
    />

    <!-- Open Graph（分享时展示） -->
    <meta property="og:title" content="Base Quest - 每日任务赚积分" />
    <meta property="og:description" content="完成任务、领取奖励、参与 Base 生态增长。" />
    <meta property="og:image" content="https://你的域名/og.png" />
    <meta property="og:url" content="https://你的域名" />
    <meta property="og:type" content="website" />

    <!-- Twitter 卡片（可选但建议） -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Base Quest - 每日任务赚积分" />
    <meta name="twitter:description" content="签到、做任务、赚积分。" />
    <meta name="twitter:image" content="https://你的域名/og.png" />

    <!-- 移动端优化（Base App 是内置浏览器） -->
    <meta name="theme-color" content="#0052FF" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- 图标（非常重要，会影响展示） -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icon.png" />

    <!-- PWA（加分项，可选） -->
    <link rel="manifest" href="/manifest.json" />

    <!-- 预加载（提升性能） -->
    <link rel="preconnect" href="https://rpc.base.org" />
    <link rel="dns-prefetch" href="https://rpc.base.org" />

    <!-- 安全策略（基础版） -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https:;" />

  </head>

  <body>
    <noscript>请启用 JavaScript 以使用本应用。</noscript>
    <div id="app"></div>

    <!-- Web3 环境提示（可选） -->
    <script>
      if (!window.ethereum) {
        console.warn("未检测到钱包环境");
      }
    </script>
  </body>
</html>
